<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aurum Dental</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@200;300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --dark:    #1a1a1a;
      --darker:  #111111;
      --green:   #8aad5a;  /* matches the muted olive/sage green from the original */
      --white:   #f0ede6;
      --white60: rgba(240,237,230,0.6);
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--dark);
      color: var(--white);
      font-family: 'Raleway', sans-serif;
      overflow: hidden; /* full-screen single page like the reference */
    }

    /* ─── FULL-SCREEN WRAPPER ─── */
    .page {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ─── HERO IMAGE  (left ~45% of screen, bleeds top & bottom) ─── */
    .hero-img {
      position: absolute;
      top: 0; left: 0;
      width: 46%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
      /* slight dark vignette on left edge so image blends into bg */
      mask-image: linear-gradient(to right, rgba(0,0,0,1) 60%, rgba(0,0,0,0) 100%);
      -webkit-mask-image: linear-gradient(to right, rgba(0,0,0,1) 60%, rgba(0,0,0,0) 100%);
    }

    /* subtle dark overlay so text on right is always readable */
    .hero-img-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 46%;
      height: 100%;
      background: linear-gradient(to right, rgba(26,26,26,0.25) 0%, rgba(26,26,26,0.65) 100%);
      pointer-events: none;
    }

    /* ─── NAV ─── */
    nav {
      position: relative;
      z-index: 10;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 2.2rem 3.5rem 0;
      gap: 2.6rem;
    }
    nav a {
      font-family: 'Raleway', sans-serif;
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--white60);
      text-decoration: none;
      transition: color 0.25s;
      position: relative;
    }
    nav a::after {
      content: '';
      position: absolute;
      left: 0; bottom: -3px;
      width: 0; height: 1px;
      background: var(--green);
      transition: width 0.3s;
    }
    nav a:hover { color: var(--white); }
    nav a:hover::after { width: 100%; }

    /* ─── CENTER CONTENT COLUMN (right half) ─── */
    .content {
      position: relative;
      z-index: 10;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;          /* horizontally centred in full viewport */
      padding-bottom: 2rem;
      /* shift the text block slightly to the right half */
      padding-left: 44%;
      padding-right: 3%;
      text-align: center;
    }

    /* ─── LOGO ─── */
    .logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 2.6rem;
      animation: fadeDown 0.9s ease both;
    }
    .logo-icon {
      width: 44px; height: 44px;
      margin-bottom: 0.55rem;
      fill: var(--green);
    }
    .logo-name {
      font-family: 'Cinzel', serif;
      font-size: 1.55rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      color: var(--green);
      line-height: 1.15;
      text-transform: lowercase;
    }

    /* ─── HEADLINE ─── */
    .headline {
      margin-bottom: 1rem;
      animation: fadeUp 0.9s 0.2s ease both;
    }
    .headline-small {
      font-family: 'Raleway', sans-serif;
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--white60);
      margin-bottom: 0.55rem;
    }
    .headline-big {
      font-family: 'Cinzel', serif;
      font-size: clamp(2.6rem, 4.5vw, 4.4rem);
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--green);
      line-height: 1.05;
      text-transform: uppercase;
    }

    /* ─── BUTTON ─── */
    .btn-learn {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.85rem 2.8rem;
      border: 1.5px solid var(--green);
      background: transparent;
      color: var(--green);
      font-family: 'Raleway', sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.3s, color 0.3s;
      animation: fadeUp 0.9s 0.4s ease both;
    }
    .btn-learn:hover {
      background: var(--green);
      color: var(--darker);
    }

    /* ─── ANIMATIONS ─── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 900px) {
      html, body { overflow: auto; }
      .page { height: auto; min-height: 100vh; }

      .hero-img,
      .hero-img-overlay {
        position: relative;
        width: 100%;
        height: 52vw;
        min-height: 260px;
        max-height: 420px;
        mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 60%, rgba(0,0,0,0) 100%);
        -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 60%, rgba(0,0,0,0) 100%);
      }
      .hero-img-overlay {
        position: absolute;
        top: 0; left: 0;
        width: 100%;
        background: linear-gradient(to bottom, rgba(26,26,26,0.2) 0%, rgba(26,26,26,0.7) 100%);
      }

      nav {
        justify-content: center;
        flex-wrap: wrap;
        gap: 1.4rem;
        padding: 1.5rem 1.5rem 0;
      }

      .content {
        padding: 2.5rem 1.5rem 3rem;
        padding-left: 1.5rem;
      }
    }

    @media (max-width: 500px) {
      .headline-big { font-size: 2.2rem; }
      nav a { font-size: 0.6rem; letter-spacing: 0.15em; }
    }
  </style>
</head>
<body>
<div class="page">

  <!-- LEFT HERO IMAGE — teeth/dental photo -->
  <img
    class="hero-img"
    src="https://images.unsplash.com/photo-1606811841689-23dfddce3e95?w=900&q=85&fit=crop&crop=center"
    alt="Dental care"
  />
  <div class="hero-img-overlay"></div>

  <!-- TOP-RIGHT NAVIGATION -->
  <nav>
    <a href="#">Welcome</a>
    <a href="#">Menu</a>
    <a href="#">Events</a>
    <a href="#">Contact</a>
  </nav>

  <!-- CENTRED CONTENT (right half) -->
  <div class="content">

    <!-- LOGO -->
    <div class="logo">
      <!-- tooth SVG icon, mirrors the leaf/plant icon style from the original -->
      <svg class="logo-icon" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path d="M24 4C17 4 11 9 11 16c0 4 1.5 7.5 2.5 10.5C15 32 15 44 20 44c3 0 4-4 4-8 0 4 1 8 4 8 5 0 5-12 6.5-17.5C35.5 23.5 37 20 37 16c0-7-6-12-13-12z"/>
      </svg>
      <span class="logo-name">aurum<br>dental</span>
    </div>

    <!-- HEADLINE -->
    <div class="headline">
      <p class="headline-small">New Opening</p>
      <p class="headline-big">23RD SEPT</p>
    </div>

    <!-- CTA -->
    <a href="#" class="btn-learn">Learn More</a>

  </div>
</div>
</body>
</html>
