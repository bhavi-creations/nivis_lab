<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Dermat Routine</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .category-img {
            height: 120px;
            object-fit: cover;
            cursor: pointer;
            border-radius: 10px;
        }

        .active-img {
            border: 3px solid red;
        }
    </style>
</head>

<body class="p-4">

    <div class="container text-center">

        <h3 class="mb-4">FIND YOUR DERMAT ROUTINE</h3>

        <!-- Top Images -->
        <div class="row g-2 justify-content-center">
            <div class="col"><img src="https://via.placeholder.com/150" class="img-fluid category-img"
                    onclick="loadData('acne', this)"></div>
            <div class="col"><img src="https://via.placeholder.com/150" class="img-fluid category-img"
                    onclick="loadData('pigmentation', this)"></div>
            <div class="col"><img src="https://via.placeholder.com/150" class="img-fluid category-img"
                    onclick="loadData('marks', this)"></div>
            <div class="col"><img src="https://via.placeholder.com/150" class="img-fluid category-img"
                    onclick="loadData('spots', this)"></div>
            <div class="col"><img src="https://via.placeholder.com/150" class="img-fluid category-img"
                    onclick="loadData('age', this)"></div>
            <div class="col"><img src="https://via.placeholder.com/150" class="img-fluid category-img"
                    onclick="loadData('dry', this)"></div>
            <div class="col"><img src="https://via.placeholder.com/150" class="img-fluid category-img"
                    onclick="loadData('eczema', this)"></div>
        </div>

        <!-- Products -->
        <div class="row mt-5" id="products"></div>

        <!-- Routine Box -->
        <div class="mt-4" id="routine"></div>

    </div>

    <script>
        function loadData(type, el) {

            // Active border
            document.querySelectorAll('.category-img').forEach(img => img.classList.remove('active-img'));
            el.classList.add('active-img');

            let productsHTML = "";
            let routineHTML = "";

            if (type === "acne") {
                productsHTML = `
      <div class="col-md-3">
        <div class="card p-2">
          <img src="https://via.placeholder.com/100">
          <p>Salicylic Acid Serum</p>
          <b>₹649</b>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card p-2">
          <img src="https://via.placeholder.com/100">
          <p>Acne Spot Gel</p>
          <b>₹495</b>
        </div>
      </div>
    `;

                routineHTML = `
      <div class="card p-3">
        <h5>Acne Routine</h5>
        <p>Cleanser → Serum → Moisturizer → Sunscreen</p>
      </div>
    `;
            }

            else if (type === "pigmentation") {
                productsHTML = `
      <div class="col-md-3">
        <div class="card p-2">
          <img src="https://via.placeholder.com/100">
          <p>Alpha Arbutin Serum</p>
          <b>₹699</b>
        </div>
      </div>
    `;

                routineHTML = `
      <div class="card p-3">
        <h5>Pigmentation Routine</h5>
        <p>Use brightening products daily</p>
      </div>
    `;
            }

            else {
                productsHTML = `
      <div class="col-md-3">
        <div class="card p-2">
          <p>No data</p>
        </div>
      </div>
    `;
                routineHTML = `<div class="card p-3">No routine available</div>`;
            }

            document.getElementById("products").innerHTML = productsHTML;
            document.getElementById("routine").innerHTML = routineHTML;
        }
    </script>

</body>

</html>
