<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>/PHD/ Header Updated</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    /* ── Promo Bar ── */
    .promo-bar {
      border-bottom: 1px solid #f2f2f2;
      padding: 10px 0;
      font-size: 13px;
      color: #666;
    }
    .promo-container {
      display: flex;
      justify-content: flex-start; /* Image lo unnattu left nundi start */
      flex-wrap: nowrap;
      overflow-x: auto; /* Mobile lo scroll avvadaniki */
      gap: 30px;
      padding-left: 15%; /* Logo alignment ki taggattu adjustment */
    }
    .promo-item {
      white-space: nowrap;
    }
    .promo-bar .highlight {
      color: #d0021b; /* Specific Red from image */
      font-weight: 600;
    }
    .item-count-text {
      color: #ccc; /* 3+ item text light color */
    }

    /* ── Navbar ── */
    .main-navbar {
      border-bottom: 1px solid #eee;
      padding: 15px 0;
      background: #fff;
    }

    /* Logo Styling */
    .navbar-brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 1;
      margin-right: 40px;
    }
    .brand-main {
      font-size: 32px;
      font-weight: 400; /* Minimal thin look */
      letter-spacing: 2px;
      color: #000;
    }
    .brand-sub {
      font-size: 8px;
      letter-spacing: 2px;
      color: #333;
      margin-top: 5px;
      font-weight: 600;
    }

    /* Nav links */
    .navbar-nav .nav-link {
      font-size: 13px;
      font-weight: 400;
      color: #444 !important;
      text-transform: uppercase;
      padding: 0 15px !important;
      letter-spacing: 0.5px;
      transition: 0.3s;
    }
    
    /* Category underline logic as per image */
    .nav-link.active-category {
      position: relative;
      background-color: #fdf2f2; /* Light pinkish highlight */
    }
    .nav-link.active-category::after {
      content: '';
      position: absolute;
      bottom: -5px;
      left: 0;
      width: 100%;
      height: 1px;
      background: #a31d2f;
    }

    /* Icons */
    .nav-icons a {
      color: #333;
      font-size: 20px;
      margin-left: 20px;
      text-decoration: none;
      position: relative;
    }
    .icon-user { color: #333 !important; position: relative; }
    .bolt-accent {
      font-size: 10px;
      color: #f39c12;
      position: absolute;
      top: 2px;
      right: -5px;
    }

    /* Cart badge */
    .cart-badge {
      position: absolute;
      top: -5px;
      right: -10px;
      background: #333;
      color: #fff;
      font-size: 9px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Mobile Adjustments */
    @media (max-width: 991px) {
      .promo-container { padding-left: 15px; }
      .brand-main { font-size: 24px; }
      .nav-icons a { margin-left: 12px; font-size: 18px; }
    }
  </style>
</head>
<body>

  <div class="promo-bar">
    <div class="container-fluid">
      <div class="promo-container">
        <span class="promo-item item-count-text">3+ item</span>
        <span class="promo-item"><span class="highlight">10% Off</span> on 1 item</span>
        <span class="promo-item"><span class="highlight">20% Off</span> on 2 item</span>
        <span class="promo-item"><span class="highlight">32% Off</span> on 3+ item</span>
      </div>
    </div>
  </div>

  <nav class="navbar navbar-expand-lg main-navbar">
    <div class="container-fluid px-lg-5">
      
      <a class="navbar-brand" href="#">
        <span class="brand-main">/PHD/</span>
        <span class="brand-sub">PROVEN HONEST DERMA</span>
      </a>

      <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link active-category" href="#">Category</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Ingredients</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Concern</a></li>
          <li class="nav-item"><a class="nav-link" href="#">The /PHD/ Story</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Skinthesis</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Rewards</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Contact Us</a></li>
        </ul>

        <div class="nav-icons d-flex align-items-center">
          <a href="#"><i class="bi bi-search"></i></a>
          <a href="#" class="icon-user">
            <i class="bi bi-person"></i>
            <i class="bi bi-lightning-fill bolt-accent"></i> </a>
          <a href="#" class="position-relative">
            <i class="bi bi-bag"></i>
            <span class="cart-badge">0</span>
          </a>
        </div>
      </div>

    </div>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
